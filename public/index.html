<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Engineer — Connect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Easy Engineer</h1>
      <p class="subtitle">Assetto Corsa Race Engineer</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="sessionCode">Session Code</label>
          <input type="text" id="sessionCode" maxlength="6" placeholder="ABC123" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="text" id="password" maxlength="4" placeholder="XXXX" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-primary" id="connectBtn">Connect</button>
      </form>

      <p class="error-msg" id="errorMsg"></p>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
